services:

  adminer:
    image: adminer
    restart: always
    ports:
      - 9001:8080

  kafka-ui:
    image: kafbat/kafka-ui:main
    ports:
      - 9002:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka