spring:

  application:
    name: ClaimApp

  datasource:
    url: ${DB_URL:jdbc:postgresql://claim-db:5432/claim}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    default-schema: claim
    liquibase-schema: liquibase

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: claim

  kafka:
    consumer:
      group-id: claim-service
